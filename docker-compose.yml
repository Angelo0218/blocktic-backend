version: "3.9"

services:
  # ── NestJS Backend (dev mode with hot-reload) ──
  backend:
    build:
      context: .
      target: development
    ports:
      - "3000:3000"
      - "9229:9229"        # Node.js debugger
    volumes:
      - .:/app             # 原始碼即時同步
      - /app/node_modules  # 保留容器內的 node_modules
    env_file: .env
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - COMPREFACE_URL=http://compreface-api:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL（主資料庫）──
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: blocktic
      POSTGRES_PASSWORD: blocktic
      POSTGRES_DB: blocktic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-EXEC", "pg_isready -U blocktic"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Redis（快取 + BullMQ + nonce 防重放）──
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── CompreFace PostgreSQL（獨立，不與主 DB 混用）──
  compreface-db:
    image: postgres:11.22-alpine
    environment:
      POSTGRES_USER: compreface
      POSTGRES_PASSWORD: compreface
      POSTGRES_DB: frs
    volumes:
      - cf-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-EXEC", "pg_isready -U compreface -d frs"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── CompreFace Core（AI 模型推論引擎）──
  compreface-core:
    image: exadel/compreface-core:1.2.0
    environment:
      ML_PORT: "3300"
      IMG_LENGTH_LIMIT: "640"
    # 如果有 NVIDIA GPU，取消下面兩行的註解
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]
    restart: unless-stopped

  # ── CompreFace API（REST API 層）──
  compreface-api:
    image: exadel/compreface-api:1.2.0
    depends_on:
      compreface-db:
        condition: service_healthy
      compreface-core:
        condition: service_started
    environment:
      POSTGRES_URL: jdbc:postgresql://compreface-db:5432/frs
      POSTGRES_USER: compreface
      POSTGRES_PASSWORD: compreface
      SPRING_PROFILES_ACTIVE: dev
      API_JAVA_OPTS: "-Xmx512m"
      COMPREFACE_CORE_URL: http://compreface-core:3300
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ── CompreFace Admin（管理介面，用來建立 API Key）──
  compreface-admin:
    image: exadel/compreface-admin:1.2.0
    depends_on:
      compreface-db:
        condition: service_healthy
    environment:
      POSTGRES_URL: jdbc:postgresql://compreface-db:5432/frs
      POSTGRES_USER: compreface
      POSTGRES_PASSWORD: compreface
      SPRING_PROFILES_ACTIVE: dev
      ADMIN_JAVA_OPTS: "-Xmx256m"
    ports:
      - "8001:8001"
    restart: unless-stopped

  # ── CompreFace UI（前端管理頁面）──
  compreface-ui:
    image: exadel/compreface-ui:1.2.0
    depends_on:
      - compreface-api
      - compreface-admin
    environment:
      API_HOST: http://compreface-api:8000
      ADMIN_HOST: http://compreface-admin:8001
    ports:
      - "8002:80"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  cf-pgdata:
